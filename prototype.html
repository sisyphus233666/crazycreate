<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>д»Ҡж—ҘжӢүдәҶеҗ?/title>
<meta name="apple-mobile-web-app-title" content="жӢүдәҶд№?>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ctext x='256' y='380' font-size='280' text-anchor='middle'%3E%F0%9F%92%A9%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Ctext x='90' y='135' font-size='100' text-anchor='middle'%3E%F0%9F%92%A9%3C/text%3E%3C/svg%3E">
<style>
/* ========== и°ғж•Ҳжһңдё»иҰҒж”№иҝҷйҮҢ ========== */
:root {
  --cal-poop-icon: #94554d;
  --bg: #000000;
  --surface: #1c1c1e;
  --surface-2: #2c2c2e;
  --label: #ffffff;
  --label-secondary: rgba(235, 235, 245, 0.6);
  --label-tertiary: #8e8e93;
  --separator: rgba(84, 84, 88, 0.65);
  --accent: #34c759;
  --accent-pressed: #30b350;
  --danger: #ff453a;
  --danger-pressed: #e0382e;
  --today-ring: #34c759;
  --radius-card: 14px;
  --radius-btn: 9999px;
  --space-page: 20px;
  --space-section: 28px;
  --emoji-hero: clamp(2.75rem, 12vw, 3.5rem);
  --btn-height: 54px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, "Segoe UI", sans-serif;
  --tap-scale: 0.97;
  --tap-duration: 0.12s;
  --tabbar-h: 52px;
  --tabbar-float-gap: 12px;
  --tabbar-radius: 22px;
  --delete-bar-h: 56px;
  /* д»Ҡж—Ҙ / еӣһйЎҫ е…ұз”Ёпјҡи®°еҪ•иЎҢеӯ—еҸ·дёҺиЎҢи·?*/
  --record-pad-x: 16px;
  --record-pad-y: 14px;
  --record-time-size: 1.0625rem;
  --record-time-line: 1.25;
  --record-sub-size: 0.875rem;
  --record-sub-line: 1.2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  min-height: 100dvh;
  color-scheme: dark;
  font-family: var(--font);
  background: var(--bg);
  color: var(--label);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

body.select-active .app {
  padding-bottom: calc(var(--tabbar-h) + var(--delete-bar-h) + 40px + var(--tabbar-float-gap) + env(safe-area-inset-bottom, 0px));
}

.app {
  min-height: 100%;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 420px;
  margin: 0 auto;
  padding: var(--space-page);
  padding-bottom: calc(var(--tabbar-h) + 40px + var(--tabbar-float-gap) + env(safe-area-inset-bottom, 0px));
}

/* ----- д»Ҡж—Ҙ ----- */
.today-view {
  display: flex;
  flex-direction: column;
}

.today-hero-stack {
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  align-items: stretch;
  padding-block: clamp(28px, 6.5vh, 52px);
  /* йҰ–еұҸз•Ҙж’‘ејҖдёҠж–№еҢәеҹҹпјҢеҲ—иЎЁеңЁдёӢж–№ж•ҙйЎөж»ҡеҠЁ */
  min-height: clamp(340px, 56dvh, 548px);
}

.date-label {
  font-size: 0.9375rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--label-secondary);
  margin-bottom: clamp(24px, 4.5vh, 42px);
  text-align: center;
  flex-shrink: 0;
}

.status-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(38px, 7.5vh, 62px);
  margin-bottom: 0;
  text-align: center;
  flex-shrink: 0;
}

.status-line {
  font-size: 1.375rem;
  font-weight: 600;
  color: var(--label);
  letter-spacing: -0.02em;
  max-width: 20rem;
  line-height: 1.25;
  order: -1;
}

.status-block .hero-wrap {
  order: 0;
}

.hero-wrap {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(var(--emoji-hero) + 8px);
}

.hero-inner {
  position: relative;
  display: inline-block;
}

.hero-emoji {
  font-size: var(--emoji-hero);
  line-height: 1;
  display: block;
}

.hero-badge {
  position: absolute;
  right: -6px;
  bottom: -2px;
  min-width: 1.65rem;
  padding: 3px 7px;
  background: var(--surface-2);
  color: var(--accent);
  font-size: 0.8125rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border-radius: 999px;
  line-height: 1.1;
  border: 1px solid var(--separator);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
}

.hero-badge[hidden] {
  display: none !important;
}

.poop-btn {
  width: 100%;
  height: var(--btn-height);
  flex-shrink: 0;
  margin-top: clamp(36px, 6.5vh, 58px);
  border: none;
  border-radius: var(--radius-btn);
  background: var(--accent);
  color: #fff;
  font-size: 1.0625rem;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: -0.02em;
  cursor: pointer;
  transition: transform var(--tap-duration) cubic-bezier(0.34, 1.2, 0.64, 1), background var(--tap-duration) ease;
  box-shadow: none;
}

.poop-btn:active {
  transform: scale(var(--tap-scale));
  background: var(--accent-pressed);
}

.section-title {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--label-tertiary);
  letter-spacing: 0.02em;
  margin: var(--space-section) 0 10px;
}

.today-view .section-title {
  margin: clamp(12px, 3vh, 20px) 0 10px;
  padding: 0 var(--record-pad-x);
  flex-shrink: 0;
  box-sizing: border-box;
}

.records-section {
  flex-shrink: 0;
  /* дё»жҢүй’®дёҺгҖҢд»ҠеӨ©гҖҚеҲ—иЎЁд№Ӣй—ҙпјҡеҶҚдёӢз§»зәҰдёҖиЎ?*/
  margin-top: clamp(28px, 4.2vh, 44px);
}

.records-section[hidden] {
  display: none !important;
}

.records-card {
  background: var(--surface);
  border-radius: var(--radius-card);
  overflow: hidden;
}

/* д»Ҡж—Ҙи®°еҪ•пјҡдёҚз”ЁеңҶи§’зҒ°еә•е®№еҷЁпјҢдёҺйЎөйқўдёҖдҪ“зәөеҗ‘й“әејҖпјҢйқ ж•ҙдҪ“дёҠж»‘жҹҘзңӢ */
.today-view .records-card {
  background: transparent;
  border-radius: 0;
  overflow: visible;
}

.record-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: var(--record-pad-y) var(--record-pad-x);
  border-bottom: 0.5px solid var(--separator);
  font-variant-numeric: tabular-nums;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.record-row:last-child { border-bottom: none; }

.record-row.select-mode-active {
  cursor: pointer;
}

.record-row.selected {
  background: rgba(52, 199, 89, 0.12);
}

.record-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--label-tertiary);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: transparent;
  transition: border-color 0.12s ease, background 0.12s ease;
}

.record-row.select-mode-active .record-check {
  color: transparent;
}

.record-row.select-mode-active.selected .record-check {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.record-row.select-mode-active.selected .record-check::after {
  content: "вң?;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
}

.record-row:not(.select-mode-active) .record-check {
  display: none;
}

.record-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex: 1;
  min-width: 0;
}

.record-time {
  font-size: var(--record-time-size);
  font-weight: 500;
  line-height: var(--record-time-line);
}

.record-sub {
  font-size: var(--record-sub-size);
  line-height: var(--record-sub-line);
  color: var(--label-secondary);
}

/* ----- ж—ҘеҺҶ ----- */
.cal-inner { padding-bottom: env(safe-area-inset-bottom, 0px); }
.calendar-view { display: none; }

.cal-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.cal-toolbar button {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 1.5rem;
  font-weight: 400;
  padding: 8px 14px;
  cursor: pointer;
  font-family: inherit;
  line-height: 1;
}

.cal-toolbar .month-title {
  font-size: 1.0625rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px 4px;
}

.cal-grid .day-name {
  text-align: center;
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--label-tertiary);
  padding: 4px 0 10px;
}

.cal-grid .day {
  position: relative;
  text-align: center;
  aspect-ratio: 1;
  max-height: 56px;
  min-height: 46px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
  transition: background 0.15s ease;
  overflow: visible;
}

.cal-grid .day.empty { visibility: hidden; pointer-events: none; }

.cal-grid .day .d-poop {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -52%);
  width: clamp(30px, 9vw, 40px);
  height: clamp(30px, 9vw, 40px);
  line-height: 0;
  color: var(--cal-poop-icon);
  opacity: 0.98;
  pointer-events: none;
  user-select: none;
  filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
}

.cal-grid .day .d-poop svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

.cal-grid .day .d-poop path {
  fill: currentColor;
}

.cal-grid .day:not(.has-poop) .d-num {
  position: relative;
  z-index: 1;
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--label);
  line-height: 1;
  text-shadow: none;
}

.cal-grid .day.has-poop .d-num {
  position: relative;
  z-index: 1;
  font-size: 0.8125rem;
  font-weight: 700;
  color: var(--label);
  line-height: 1;
  margin-top: 2px;
  text-shadow:
    -1px 0 3px rgba(0, 0, 0, 0.9),
    1px 0 3px rgba(0, 0, 0, 0.9),
    0 0 5px rgba(0, 0, 0, 0.85),
    0 1px 2px rgba(0, 0, 0, 0.75);
}

.cal-grid .day.today {
  box-shadow: inset 0 0 0 1.5px var(--today-ring);
}

.cal-grid .day.selected {
  background: var(--surface-2);
}

.cal-detail {
  margin-top: 20px;
  background: var(--surface);
  border-radius: var(--radius-card);
  padding: 0;
  display: none;
  overflow: hidden;
}

.cal-detail.visible { display: block; }

.cal-detail .d-head {
  font-size: 0.875rem;
  color: var(--label-secondary);
  margin-bottom: 0;
  padding: 16px var(--record-pad-x) 12px;
  font-weight: 500;
}

.cal-detail .d-line {
  font-size: 0.9375rem;
  padding: 8px var(--record-pad-x);
  border-top: 0.5px solid var(--separator);
  color: var(--label);
}

.cal-detail .d-line:first-of-type { border-top: none; padding-top: 0; }
.cal-detail .d-empty {
  color: var(--label-tertiary);
  font-size: 0.9375rem;
  padding: 0 var(--record-pad-x) 16px;
}

/* еӣһйЎҫиҜҰжғ…еҶ…еҲ—иЎЁпјҡдёҺеӨ–еұӮзҒ°еә•еҗҲдёҖпјҢйҒҝе…ҚеҶ…еұӮеҶҚжҠҠеә•и§’еҲҮжҲҗзӣҙи§?*/
.cal-detail .records-card.cal-detail-records {
  margin-top: 10px;
  background: transparent;
  border-radius: 0;
  overflow: visible;
}

.cal-detail-footer {
  margin-top: 0;
  padding: 12px var(--record-pad-x) 16px;
  border-top: 0.5px solid var(--separator);
}

.cal-detail-footer[hidden] {
  display: none !important;
}

.backfill-btn {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: none;
  background: var(--surface-2);
  color: var(--accent);
  font-size: 1rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}

.backfill-btn:active {
  opacity: 0.85;
}

/* иЎҘжӢүеҚҠзӘ— */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.48);
  z-index: 25;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}

.sheet-backdrop.is-open {
  opacity: 1;
  visibility: visible;
}

.sheet-panel {
  position: fixed;
  left: 50%;
  right: auto;
  transform: translate(-50%, 100%);
  bottom: 0;
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 8px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  z-index: 26;
  box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.35);
  border-top: 0.5px solid var(--separator);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}

.sheet-panel.is-open {
  transform: translate(-50%, 0);
}

.sheet-grab {
  width: 36px;
  height: 5px;
  border-radius: 3px;
  background: var(--separator);
  margin: 4px auto 14px;
  opacity: 0.85;
}

.sheet-title {
  font-size: 1.0625rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: -0.02em;
}

.sheet-time-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 52px;
  padding: 10px 16px;
  margin-bottom: 22px;
  background: var(--surface-2);
  border-radius: var(--radius-card);
  border: 0.5px solid var(--separator);
  box-sizing: border-box;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.sheet-time-label {
  font-size: 1.0625rem;
  font-weight: 500;
  color: var(--label);
  letter-spacing: -0.01em;
  flex-shrink: 0;
}

.sheet-time-native {
  flex: 0 0 auto;
  min-width: 6.5rem;
  height: 40px;
  padding: 0 4px 0 8px;
  margin: 0;
  border: none;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.25);
  color: var(--label);
  font-size: 1.125rem;
  font-weight: 600;
  font-family: inherit;
  font-variant-numeric: tabular-nums;
  text-align: right;
  -webkit-appearance: none;
  appearance: none;
}

.sheet-time-native::-webkit-calendar-picker-indicator {
  filter: invert(1) opacity(0.45);
  cursor: pointer;
  padding: 4px;
  margin-left: 2px;
}

.sheet-time-native:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.35);
}

.sheet-actions {
  display: flex;
  gap: 12px;
}

.sheet-actions button {
  flex: 1;
  height: 48px;
  border-radius: 12px;
  font-size: 1.0625rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: none;
}

.sheet-actions .sheet-cancel {
  background: var(--surface-2);
  color: var(--label);
}

.sheet-actions .sheet-confirm {
  background: var(--accent);
  color: #fff;
}

.sheet-actions .sheet-cancel:active,
.sheet-actions .sheet-confirm:active {
  opacity: 0.88;
}

/* ----- еҲ йҷӨжқ?----- */
.delete-bar {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(var(--tabbar-h) + var(--tabbar-float-gap) + env(safe-area-inset-bottom, 0px));
  width: 100%;
  max-width: 420px;
  height: var(--delete-bar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 16px;
  background: var(--surface);
  border-top: 0.5px solid var(--separator);
  z-index: 12;
  box-sizing: border-box;
}

.delete-bar[hidden] {
  display: none !important;
}

.delete-bar button {
  font-family: inherit;
  font-size: 1.0625rem;
  font-weight: 600;
  border: none;
  background: none;
  cursor: pointer;
  padding: 10px 8px;
  border-radius: 8px;
}

.delete-bar-cancel {
  color: var(--accent);
}

.delete-bar-del {
  color: var(--danger);
}

.delete-bar-del:disabled {
  color: var(--label-tertiary);
  opacity: 0.45;
  cursor: not-allowed;
}

/* ----- еә•ж ҸпјҲжө®еҠЁеңҶи§’иғ¶еӣҠпјү ----- */
.tabbar {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(var(--tabbar-float-gap) + env(safe-area-inset-bottom, 0px));
  width: calc(100% - 36px);
  max-width: calc(420px - 36px);
  min-height: var(--tabbar-h);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
  padding: 8px 10px;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: saturate(160%) blur(20px);
  -webkit-backdrop-filter: saturate(160%) blur(20px);
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  border-radius: var(--tabbar-radius);
  box-shadow:
    0 4px 24px rgba(0, 0, 0, 0.35),
    0 1px 0 rgba(255, 255, 255, 0.06) inset;
  z-index: 10;
  box-sizing: border-box;
}

.tabbar button {
  flex: 1;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--label-tertiary);
  padding: 12px 10px;
  border-radius: 16px;
  cursor: pointer;
  transition: color 0.2s ease, background 0.2s ease, transform 0.12s ease;
  -webkit-tap-highlight-color: transparent;
}

.tabbar button:active {
  transform: scale(0.98);
}

.tabbar button.active {
  color: var(--accent);
  font-weight: 600;
  background: rgba(52, 199, 89, 0.18);
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset;
}

.row-enter {
  animation: rowIn 0.2s ease forwards;
}
@keyframes rowIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ----- еӨҡдәӢйЎ№пјҡйЎ¶йғЁеҲҮжҚў ----- */
.tracker-header {
  display: flex;
  align-items: stretch;
  gap: 10px;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.tracker-switch {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: 14px;
  background: var(--surface);
  border: 0.5px solid var(--separator);
  color: inherit;
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  min-width: 0;
  transition: transform var(--tap-duration) ease, opacity 0.15s ease;
}
.tracker-switch:active {
  transform: scale(0.98);
  opacity: 0.92;
}
.tracker-switch-emoji {
  font-size: 1.5rem;
  line-height: 1;
  flex-shrink: 0;
}
.tracker-switch-name {
  flex: 1;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tracker-switch-chev {
  flex-shrink: 0;
  font-size: 0.65rem;
  color: var(--label-tertiary);
  opacity: 0.9;
}
#trackerPickerBackdrop { z-index: 28; }
#trackerPickerSheet { z-index: 29; }
#trackerFormBackdrop { z-index: 30; }
#trackerFormSheet { z-index: 31; }
.sheet-panel-tall {
  max-height: min(72vh, 560px);
  display: flex;
  flex-direction: column;
}
.tracker-list-wrap {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  margin: 0 -4px;

  function foldInProfileDataOnce() {
    try {
      if (localStorage.getItem(STORAGE_KEY)) return;
      let blob = null;
      const metaRaw = localStorage.getItem(PROFILE_META_KEY);
      if (metaRaw) {
        const meta = JSON.parse(metaRaw);
        if (meta && meta.id) blob = localStorage.getItem(PROFILE_DATA_PREFIX + meta.id);
      }
      if (!blob) {
        const found = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.indexOf(PROFILE_DATA_PREFIX) === 0) found.push(k);
        }
        if (found.length === 1) blob = localStorage.getItem(found[0]);
      }
      if (blob) localStorage.setItem(STORAGE_KEY, blob);
    } catch (e) {}
  }

  foldInProfileDataOnce();

  function defaultState() {

  }

  function looksLikeLegacyDayMap(obj) {
    if (!obj || typeof obj !== 'object') return false;
    const keys = Object.keys(obj);
    if (keys.length === 0) return false;
    return keys.some(function (k) {
      return /^\d{4}-\d{2}-\d{2}$/.test(k);
    });
  }

  function migratePayload(parsed) {
    if (parsed && parsed.version === DATA_VERSION && Array.isArray(parsed.trackers)) {
      return parsed;
    }
    const st = defaultState();
    if (parsed && typeof parsed === 'object' && looksLikeLegacyDayMap(parsed)) {
      st.records[DEFAULT_TRACKER_ID] = parsed;
    }
    return st;
  }

    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return migratePayload(JSON.parse(raw));
    } catch (e) {
      return defaultState();
    }
  }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    document.getElementById('trackerSwitchEmoji').textContent = t.emoji || 'рҹ’©';
    document.getElementById('trackerSwitchName').textContent = t.name || 'дәӢйЎ№';
  }

  function openBackfillSheet() {
    const state = loadAppState();
    const t = getActiveTracker(state);
    setSelectMode(false);
    document.getElementById('backfillTime').value = '10:00';
    document.getElementById('backfillSheetTitle').textContent =
      isDefaultPoopTracker(t) ? 'иЎҘжӢү' : 'иЎҘи®°';
    document.getElementById('backfillTimeLabel').textContent =
      isDefaultPoopTracker(t) ? 'рҹ’©ж—¶й—ҙ' : 'ж—¶й—ҙ';
    document.getElementById('backfillBackdrop').classList.add('is-open');
    document.getElementById('backfillSheet').classList.add('is-open');
    document.getElementById('backfillBackdrop').setAttribute('aria-hidden', 'false');
  }

  function closeBackfillSheet() {
    document.getElementById('backfillBackdrop').classList.remove('is-open');
    document.getElementById('backfillSheet').classList.remove('is-open');
    document.getElementById('backfillBackdrop').setAttribute('aria-hidden', 'true');
  }

  function closeTrackerPicker() {
    document.getElementById('trackerPickerBackdrop').classList.remove('is-open');
    document.getElementById('trackerPickerSheet').classList.remove('is-open');
    document.getElementById('trackerPickerBackdrop').setAttribute('aria-hidden', 'true');
    document.getElementById('trackerSwitchBtn').setAttribute('aria-expanded', 'false');
  }

  function openTrackerPicker() {
    closeTrackerForm();
    renderTrackerList();
    document.getElementById('trackerPickerBackdrop').classList.add('is-open');
    document.getElementById('trackerPickerSheet').classList.add('is-open');
    document.getElementById('trackerPickerBackdrop').setAttribute('aria-hidden', 'false');
    document.getElementById('trackerSwitchBtn').setAttribute('aria-expanded', 'true');
  }

  function renderTrackerList() {
    const state = loadAppState();
    const wrap = document.getElementById('trackerListWrap');
    wrap.innerHTML = state.trackers
      .map(function (tr) {
        const active = tr.id === state.activeTrackerId;
        return (
          '<div class="tracker-row' +
          (active ? ' is-active' : '') +
          '" data-id="' +
          tr.id +
          '">' +
          '<button type="button" class="tracker-row-main" data-switch="' +
          tr.id +
          '">' +
          '<span class="tracker-row-emoji">' +
          (tr.emoji || 'рҹ“қ') +
          '</span>' +
          '<span class="tracker-row-name">' +
          escapeHtml(tr.name) +
          '</span>' +
          '</button>' +
          '<button type="button" class="tracker-row-edit" data-edit="' +
          tr.id +
          '" aria-label="зј–иҫ‘">вң?/button>' +
          '</div>'
        );
      })
      .join('');

    wrap.querySelectorAll('[data-switch]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const id = btn.getAttribute('data-switch');
        const st = loadAppState();
        st.activeTrackerId = id;
        saveAppState(st);
        selectedCalendarDate = null;
        closeTrackerPicker();
        renderTrackerHeader();
        renderToday();
        renderCalendar();
      });
    });
    wrap.querySelectorAll('[data-edit]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const id = btn.getAttribute('data-edit');
        closeTrackerPicker();
        openTrackerForm(id);
      });
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function closeTrackerForm() {
    document.getElementById('trackerFormBackdrop').classList.remove('is-open');
    document.getElementById('trackerFormSheet').classList.remove('is-open');
    document.getElementById('trackerFormBackdrop').setAttribute('aria-hidden', 'true');
    formEditId = null;
  }

  function renderIconPicker(selectedId) {
    const grid = document.getElementById('iconPickerGrid');
    grid.innerHTML = Object.keys(ICON_LIBRARY)
      .map(function (id) {
        const meta = ICON_LIBRARY[id];
        const sel = id === selectedId ? ' selected' : '';
        const inner =
          meta.kind === 'poop' || id === 'poop'
            ? POOP_SVG_INNER
            : '<svg viewBox="0 0 24 24">' + meta.path + '</svg>';
        return (
          '<button type="button" class="icon-pick-btn' +
          sel +
          '" data-icon="' +
          id +
          '" style="color:' +
          meta.color +
          '" aria-label="' +
          escapeHtml(meta.label) +
          '" title="' +
          escapeHtml(meta.label) +
          '">' +
          inner +
          '</button>'
        );
      })
      .join('');

    grid.querySelectorAll('.icon-pick-btn').forEach(function (b) {
      b.addEventListener('click', function () {
        formSelectedIconId = b.getAttribute('data-icon');
        grid.querySelectorAll('.icon-pick-btn').forEach(function (x) {
          x.classList.toggle('selected', x === b);
        });
      });
    });
  }

  function openTrackerForm(editId) {
    closeTrackerPicker();
    closeBackfillSheet();
    formEditId = editId || null;
    const state = loadAppState();
    const delBtn = document.getElementById('trackerFormDelete');
    if (formEditId) {
      const tr = state.trackers.find(function (x) {
        return x.id === formEditId;
      });
      document.getElementById('trackerFormTitle').textContent = 'зј–иҫ‘дәӢйЎ№';
      document.getElementById('trackerNameInput').value = tr ? tr.name : '';
      document.getElementById('trackerEmojiInput').value = tr ? tr.emoji : '';
      formSelectedIconId = (tr && tr.iconId) || 'poop';
      delBtn.hidden = state.trackers.length <= 1;
    } else {
      document.getElementById('trackerFormTitle').textContent = 'ж·»еҠ дәӢйЎ№';
      document.getElementById('trackerNameInput').value = '';
      document.getElementById('trackerEmojiInput').value = '';
      formSelectedIconId = 'moon';
      delBtn.hidden = true;
    }
    renderIconPicker(formSelectedIconId);
    document.getElementById('trackerFormBackdrop').classList.add('is-open');
    document.getElementById('trackerFormSheet').classList.add('is-open');
    document.getElementById('trackerFormBackdrop').setAttribute('aria-hidden', 'false');
  }

  function saveTrackerForm() {
    const name = document.getElementById('trackerNameInput').value.trim();
    let emoji = document.getElementById('trackerEmojiInput').value.trim();
    if (!name) {
      alert('иҜ·еЎ«еҶҷдәӢйЎ№еҗҚз§?);
      return;
    }
    if (!emoji) emoji = 'рҹ“қ';
    const iconId = formSelectedIconId in ICON_LIBRARY ? formSelectedIconId : 'poop';

    const state = loadAppState();
    if (formEditId) {
      const tr = state.trackers.find(function (x) {
        return x.id === formEditId;
      });
      if (tr) {
        tr.name = name;
        tr.emoji = emoji;
        tr.iconId = iconId;
      }
    } else {
      state.trackers.push({
        id: genTrackerId(),
        name: name,
        emoji: emoji,
        iconId: iconId,
      });
      state.activeTrackerId = state.trackers[state.trackers.length - 1].id;
    }
    saveAppState(state);
    closeTrackerForm();
    renderTrackerHeader();
    selectedCalendarDate = null;
    renderToday();
    renderCalendar();
  }

  function deleteTrackerForm() {
    if (!formEditId) return;
    const state = loadAppState();
    if (state.trackers.length <= 1) return;
    if (!confirm('еҲ йҷӨиҜҘдәӢйЎ№е°ҶеҗҢж—¶еҲ йҷӨе…¶жүҖжңүи®°еҪ•пјҢзЎ®е®ҡеҗ—пјҹ')) return;
    state.trackers = state.trackers.filter(function (x) {
      return x.id !== formEditId;
    });
    delete state.records[formEditId];
    if (state.activeTrackerId === formEditId) {
      state.activeTrackerId = state.trackers[0].id;
    }
    saveAppState(state);
    closeTrackerForm();
    renderTrackerHeader();
    selectedCalendarDate = null;
    renderToday();
    renderCalendar();
  }

  function setSelectMode(on) {
    recordSelectMode = !!on;
    selectedIndices = new Set();
    if (!on) recordSelectTargetDate = null;
    const bar = document.getElementById('deleteBar');
    const body = document.body;
    if (recordSelectMode) {
      bar.hidden = false;
      body.classList.add('select-active');
    } else {
      bar.hidden = true;
      body.classList.remove('select-active');
    }
    updateDeleteButton();
    renderToday();
    const calView = document.getElementById('calendarView');
    if (selectedCalendarDate && calView && calView.style.display !== 'none') {
      showDayDetail(selectedCalendarDate);
    }
  }

  function updateDeleteButton() {
    const btn = document.getElementById('deleteConfirm');
    btn.disabled = selectedIndices.size === 0;
  }

  function wireRecordRows(container, targetDate, rerender) {
    if (!container) return;
    container.querySelectorAll('.record-row').forEach(function (row) {
      const idx = parseInt(row.dataset.index, 10);
      function toggleSelect() {
        if (!recordSelectMode) return;
        if (selectedIndices.has(idx)) selectedIndices.delete(idx);
        else selectedIndices.add(idx);
        row.classList.toggle('selected', selectedIndices.has(idx));
        updateDeleteButton();
      }
      row.addEventListener('click', function () {
        if (Date.now() < suppressRowClicksUntil) return;
        toggleSelect();
      });
      row.addEventListener('contextmenu', function (e) {
        e.preventDefault();
        if (!recordSelectMode) {
          suppressRowClicksUntil = Date.now() + 380;
          recordSelectTargetDate = targetDate;
          selectedIndices = new Set([idx]);
          recordSelectMode = true;
          document.getElementById('deleteBar').hidden = false;
          document.body.classList.add('select-active');
          updateDeleteButton();
          rerender();
        }
      });
    });

    container.querySelectorAll('.record-row').forEach(function (row) {
      const idx = parseInt(row.dataset.index, 10);
      function start() {
        if (recordSelectMode) return;
        pointerDownEl = row;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(function () {
          if (pointerDownEl !== row) return;
          suppressRowClicksUntil = Date.now() + 380;
          recordSelectTargetDate = targetDate;
          recordSelectMode = true;
          selectedIndices = new Set([idx]);
          document.getElementById('deleteBar').hidden = false;
          document.body.classList.add('select-active');
          updateDeleteButton();
          rerender();
          if (navigator.vibrate) navigator.vibrate(20);
        }, LONG_PRESS_MS);
      }
      function end() {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        pointerDownEl = null;
      }
      function cancel() {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        pointerDownEl = null;
      }

      row.addEventListener('touchstart', start, { passive: true });
      row.addEventListener('touchend', end);
      row.addEventListener('touchcancel', cancel);
      row.addEventListener('mousedown', start);
      row.addEventListener('mouseup', end);
      row.addEventListener('mouseleave', cancel);
    });
  }

  function applyTodayHead(tracker, count) {
    const u = todayHeadUI(tracker, count);
    document.getElementById('statusLine').textContent = u.title;
    document.getElementById('heroEmoji').textContent = u.face;
    const badge = document.getElementById('heroBadge');
    if (u.badge) {
      badge.textContent = u.badge;
      badge.hidden = false;
    } else {
      badge.hidden = true;
    }
    document.getElementById('poopBtn').textContent = u.btn;
  }

  function renderToday() {
    const today = todayStr();
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    if (!data[today]) data[today] = { count: 0, times: [] };
    const rec = data[today];
    if (!Array.isArray(rec.times)) rec.times = [];
    rec.count = rec.times.length;
    saveAppState(state);

    document.getElementById('todayDate').textContent = formatTodayLabel();
    applyTodayHead(tracker, rec.count);

    const section = document.getElementById('recordsSection');
    const card = document.getElementById('recordsCard');

    if (rec.times.length === 0) {
      section.hidden = true;
      card.innerHTML = '';
      return;
    }

    section.hidden = false;
    const rev = rec.times.slice().reverse();
    card.innerHTML = rev
      .map(function (t, i) {
        const origIndex = rec.times.length - 1 - i;
        const n = origIndex + 1;
        const sm =
          recordSelectMode && recordSelectTargetDate === today ? ' select-mode-active' : '';
        const selC = sm && selectedIndices.has(origIndex) ? ' selected' : '';
        return (
          '<div class="record-row row-enter' +
          sm +
          selC +
          '" data-index="' +
          origIndex +
          '">' +
          '<span class="record-check" aria-hidden="true"></span>' +
          '<div class="record-main">' +
          '<span class="record-time">' +
          t +
          '</span>' +
          '<span class="record-sub">з¬?' +
          n +
          ' ж¬?/span>' +
          '</div></div>'
        );
      })
      .join('');

    wireRecordRows(card, today, renderToday);
  }

  document.getElementById('poopBtn').addEventListener('click', function () {
    const today = todayStr();
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    if (!data[today]) data[today] = { count: 0, times: [] };
    data[today].times.push(timeStr());
    data[today].count = data[today].times.length;
    saveAppState(state);
    renderToday();
    if (navigator.vibrate) navigator.vibrate(15);
  });

  document.getElementById('deleteCancel').addEventListener('click', function () {
    setSelectMode(false);
  });

  document.getElementById('deleteConfirm').addEventListener('click', function () {
    if (selectedIndices.size === 0 || !recordSelectTargetDate) return;
    const key = recordSelectTargetDate;
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    const rec = data[key];
    if (!rec || !rec.times) return;
    const keep = rec.times.filter(function (_, i) {
      return !selectedIndices.has(i);
    });
    rec.times = keep;
    rec.count = rec.times.length;
    saveAppState(state);
    setSelectMode(false);
    renderCalendar();
    if (navigator.vibrate) navigator.vibrate(12);
  });

  function switchTab(tab) {
    closeBackfillSheet();
    closeTrackerPicker();
    closeTrackerForm();
    setSelectMode(false);
    document.getElementById('todayView').style.display = tab === 'today' ? 'block' : 'none';
    document.getElementById('calendarView').style.display = tab === 'cal' ? 'block' : 'none';
    document.getElementById('navToday').classList.toggle('active', tab === 'today');
    document.getElementById('navCal').classList.toggle('active', tab === 'cal');
    if (tab === 'cal') renderCalendar();
  }

  document.getElementById('navToday').addEventListener('click', function () {
    switchTab('today');
  });
  document.getElementById('navCal').addEventListener('click', function () {
    switchTab('cal');
  });

  document.getElementById('trackerSwitchBtn').addEventListener('click', function () {
    openTrackerPicker();
  });
  document.getElementById('trackerPickerBackdrop').addEventListener('click', closeTrackerPicker);
  document.getElementById('addTrackerOpenBtn').addEventListener('click', function () {
    closeTrackerPicker();
    openTrackerForm(null);
  });
  document.getElementById('trackerFormBackdrop').addEventListener('click', closeTrackerForm);
  document.getElementById('trackerFormCancel').addEventListener('click', closeTrackerForm);
  document.getElementById('trackerFormSave').addEventListener('click', saveTrackerForm);
  document.getElementById('trackerFormDelete').addEventListener('click', deleteTrackerForm);

  function renderCalendar() {
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    const now = new Date();
    if (currentYear === undefined) {
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
    }
    document.getElementById('calMonth').textContent = currentYear + 'е№? + (currentMonth + 1) + 'жң?;
    const grid = document.getElementById('calGrid');
    const names = ['ж—?, 'дёҖ', 'дә?, 'дё?, 'еӣ?, 'дә?, 'е…?];
    let html = names.map(function (n) {
      return '<div class="day-name">' + n + '</div>';
    }).join('');

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = todayStr();
    const markSvg = calDayIconMarkup(tracker.iconId || 'poop');

    for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const ds =
        currentYear +
        '-' +
        String(currentMonth + 1).padStart(2, '0') +
        '-' +
        String(d).padStart(2, '0');
      const isToday = ds === today;
      const row = data[ds];
      const hasPoop = row && row.times && row.times.length > 0;
      const poopEl = hasPoop ? markSvg : '';
      html +=
        '<div class="day' +
        (isToday ? ' today' : '') +
        (hasPoop ? ' has-poop' : '') +
        '" data-date="' +
        ds +
        '">' +
        poopEl +
        '<span class="d-num">' +
        d +
        '</span>' +
        '</div>';
    }
    grid.innerHTML = html;

    grid.querySelectorAll('.day:not(.empty)').forEach(function (el) {
      el.addEventListener('click', function () {
        showDayDetail(el.dataset.date);
      });
    });

    const detail = document.getElementById('calDetail');
    const [tty, ttm] = today.split('-').map(Number);
    if (!selectedCalendarDate && currentYear === tty && currentMonth === ttm - 1) {
      selectedCalendarDate = today;
    }

    if (selectedCalendarDate) {
      const still = grid.querySelector('.day[data-date="' + selectedCalendarDate + '"]');
      if (still) {
        still.classList.add('selected');
        detail.classList.add('visible');
        showDayDetail(selectedCalendarDate);
      } else {
        selectedCalendarDate = null;
        detail.classList.remove('visible');
      }
    } else {
      detail.classList.remove('visible');
    }
  }

  function calDetailLabel(ds) {
    const [y, m, d] = ds.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const w = ['е‘Ёж—Ҙ', 'е‘ЁдёҖ', 'е‘ЁдәҢ', 'е‘Ёдёү', 'е‘Ёеӣӣ', 'е‘Ёдә”', 'е‘Ёе…ӯ'][dt.getDay()];
    return w + ' В· ' + m + 'жң? + d + 'ж—?;
  }

  function detailEmptyCopy(tracker, ds, today) {
    if (isDefaultPoopTracker(tracker)) {
      if (ds > today) return 'йІҒиҝ…иҜҙиҝҮпјҡдәәдёҚиғҪжӢүжңӘжқҘзҡ„рҹ’©';
      if (ds === today) return 'д»ҠеӨ©иҝҳжІЎжӢ?;
      return 'иҝҷеӨ©жІЎжӢү рҹҳў';
    }
    if (ds > today) return 'иҝҳдёҚиғҪи®°еҪ•иҝҷдёҖеӨ©е“Ұ';
    if (ds === today) return 'д»ҠеӨ©иҝҳжІЎжңүи®°еҪ?;
    return 'иҝҷеӨ©иҝҳжІЎжңүи®°еҪ?;
  }

  function detailSummaryLine(tracker, n) {
    if (isDefaultPoopTracker(tracker)) {
      return 'рҹ’©жӢүдәҶ' + n + 'ж¬?;
    }
    return (tracker.emoji || 'рҹ“қ') + ' е…?' + n + ' ж¬?;
  }

  function showDayDetail(ds) {
    selectedCalendarDate = ds;
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    const rec = data[ds];
    const detail = document.getElementById('calDetail');
    document.getElementById('detailDate').textContent = calDetailLabel(ds);
    const body = document.getElementById('detailBody');

    const times = rec && rec.times ? rec.times : [];
    const today = todayStr();

    if (times.length === 0) {
      body.innerHTML = '<div class="d-empty">' + detailEmptyCopy(tracker, ds, today) + '</div>';
    } else {
      let h = '<div class="d-line cal-detail-summary">' + detailSummaryLine(tracker, times.length) + '</div>';
      h += '<div class="records-card cal-detail-records" id="detailRecordsCard">';
      const rev = times.slice().reverse();
      rev.forEach(function (t, i) {
        const origIndex = times.length - 1 - i;
        const n = origIndex + 1;
        const sm =
          recordSelectMode && recordSelectTargetDate === ds ? ' select-mode-active' : '';
        const selC = sm && selectedIndices.has(origIndex) ? ' selected' : '';
        h +=
          '<div class="record-row row-enter' +
          sm +
          selC +
          '" data-index="' +
          origIndex +
          '">' +
          '<span class="record-check" aria-hidden="true"></span>' +
          '<div class="record-main">' +
          '<span class="record-time">' +
          t +
          '</span>' +
          '<span class="record-sub">з¬?' +
          n +
          ' ж¬?/span>' +
          '</div></div>';
      });
      h += '</div>';
      body.innerHTML = h;
      wireRecordRows(document.getElementById('detailRecordsCard'), ds, function () {
        showDayDetail(ds);
      });
    }

    const footer = document.getElementById('detailFooter');
    if (isPastDate(ds)) {
      footer.hidden = false;
      footer.innerHTML =
        '<button type="button" class="backfill-btn">' +
        (isDefaultPoopTracker(tracker) ? 'иЎҘжӢү' : 'иЎҘи®°') +
        '</button>';
    } else {
      footer.hidden = true;
      footer.innerHTML = '';
    }

    detail.classList.add('visible');
    document.querySelectorAll('.cal-grid .day.selected').forEach(function (el) {
      el.classList.remove('selected');
    });
    const target = document.querySelector('.cal-grid .day[data-date="' + ds + '"]');
    if (target) target.classList.add('selected');
  }

  document.getElementById('calDetail').addEventListener('click', function (e) {
    if (!e.target.classList.contains('backfill-btn')) return;
    if (!selectedCalendarDate || !isPastDate(selectedCalendarDate)) return;
    openBackfillSheet();
  });

  document.getElementById('backfillBackdrop').addEventListener('click', closeBackfillSheet);
  document.getElementById('backfillCancel').addEventListener('click', closeBackfillSheet);
  document.getElementById('backfillConfirm').addEventListener('click', function () {
    const ds = selectedCalendarDate;
    if (!ds || !isPastDate(ds)) {
      closeBackfillSheet();
      return;
    }
    let raw = document.getElementById('backfillTime').value;
    if (!raw) raw = '10:00';
    const t = raw.length >= 5 ? raw.slice(0, 5) : '10:00';
    const state = loadAppState();
    const tracker = getActiveTracker(state);
    const data = getTrackerRecords(state, tracker.id);
    if (!data[ds]) data[ds] = { count: 0, times: [] };
    if (!Array.isArray(data[ds].times)) data[ds].times = [];
    data[ds].times.push(t);
    data[ds].count = data[ds].times.length;
    saveAppState(state);
    closeBackfillSheet();
    showDayDetail(ds);
    renderCalendar();
  });

  document.getElementById('prevMonth').addEventListener('click', function () {
    closeBackfillSheet();
    closeTrackerPicker();
    closeTrackerForm();
    setSelectMode(false);
    currentMonth--;
    if (currentMonth < 0) {
      currentMonth = 11;
      currentYear--;
    }
    selectedCalendarDate = null;
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', function () {
    closeBackfillSheet();
    closeTrackerPicker();
    closeTrackerForm();
    setSelectMode(false);
    currentMonth++;
    if (currentMonth > 11) {
      currentMonth = 0;
      currentYear++;
    }
    selectedCalendarDate = null;
    renderCalendar();
  });

  renderTrackerHeader();
  renderToday();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  }
})();

</script>
